<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sutra-Terminal // Module Archive</title>
    <style>
        :root {
            --bg-color: #0c0c0c;
            --border-color: rgba(255, 255, 255, 0.3);
            --accent-color: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.5);
            --font-main: 'Courier New', Courier, monospace;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--accent-color);
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .tech-box {
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.02);
            position: relative;
        }
        .tech-box::before, .tech-box::after {
            content: ''; position: absolute; width: 10px; height: 10px; border: 1px solid var(--accent-color);
        }
        .tech-box::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
        .tech-box::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

        .sidebar {
            flex: 0 0 320px;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .module-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .module-list::-webkit-scrollbar { width: 6px; }
        .module-list::-webkit-scrollbar-thumb { background: var(--border-color); }

        .module-item {
            border: 1px dashed var(--border-color);
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }
        .module-item img {
            width: 70%;
            height: 70%;
            object-fit: contain;
            filter: opacity(0.7);
        }
        .module-item-id {
            position: absolute;
            bottom: 5px;
            font-size: 10px;
            color: var(--text-muted);
        }
        .module-item:hover, .module-item.active {
            border: 1px solid var(--accent-color);
            background: rgba(255, 255, 255, 0.1);
        }
        .module-item.active img { filter: opacity(1); }

        .main-viewer {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .viewer-header {
            padding: 15px 20px;
            border-bottom: 1px dashed var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }

        /* --- 터미널 복귀 버튼 스타일 --- */
        .btn-return {
            text-decoration: none;
            color: var(--accent-color);
            border: 1px solid var(--border-color);
            padding: 5px 10px;
            font-size: 10px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            background: transparent;
        }
        .btn-return:hover {
            background: var(--accent-color);
            color: var(--bg-color);
        }

        .viewer-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        #mainImage {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.3));
            transition: opacity 0.3s ease;
        }

        .viewer-footer {
            padding: 15px 20px;
            border-top: 1px dashed var(--border-color);
            font-size: 12px;
            color: var(--text-muted);
            text-align: right;
        }

        .crosshair {
            position: absolute; width: 30px; height: 30px; border: 1px solid rgba(255,255,255,0.2);
        }
        .crosshair.c1 { top: 10%; left: 10%; border-right: none; border-bottom: none; }
        .crosshair.c2 { bottom: 10%; right: 10%; border-left: none; border-top: none; }

        @media (max-width: 768px) {
            .app-container { flex-direction: column; padding: 10px; }
            .sidebar { flex: 0 0 140px; }
            .module-list { display: flex; overflow-x: auto; overflow-y: hidden; }
            .module-item { flex: 0 0 100px; height: 100px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="tech-box sidebar">
        <div class="sidebar-header">SYSTEM_MODULE_DB <span style="float:right;">[50]</span></div>
        <div class="module-list" id="moduleContainer"></div>
    </aside>

    <main class="tech-box main-viewer">
        <div class="viewer-header">
            <span id="headerTitle">SELECT_MODULE...</span>
            <div style="display: flex; align-items: center; gap: 15px;">
                <span>STATUS: ACTIVE</span>
                <a href="https://hasi612.github.io/SuturaWave_Terminal/" class="btn-return">RETURN_TO_TERMINAL</a>
            </div>
        </div>
        <div class="viewer-content">
            <div class="crosshair c1"></div>
            <div class="crosshair c2"></div>
            <img id="mainImage" src="" alt="Selected Module">
        </div>
        <div class="viewer-footer">
            <span id="footerDesc">VIBRATION_SANCTUARY // PURIFIED_DATA_SET</span>
        </div>
    </main>
</div>

    ];

    const container = document.getElementById('moduleContainer');
    const mainImage = document.getElementById('mainImage');
    const headerTitle = document.getElementById('headerTitle');
    let activeItem = null;

    moduleData.forEach((mod, index) => {
        const itemBox = document.createElement('div');
        itemBox.className = 'module-item';
        itemBox.onclick = () => selectModule(itemBox, mod);

        const img = document.createElement('img');
        img.src = mod.src;
        
        const label = document.createElement('div');
        label.className = 'module-item-id';
        label.innerText = `#${mod.id}`;

        itemBox.appendChild(img);
        itemBox.appendChild(label);
        container.appendChild(itemBox);

        if (index === 0) selectModule(itemBox, mod);
    });

    function selectModule(element, data) {
        if (activeItem) activeItem.classList.remove('active');
        element.classList.add('active');
        activeItem = element;

        mainImage.style.opacity = 0;
        setTimeout(() => {
            mainImage.src = data.src;
            headerTitle.innerText = `MODULE_ID: #${data.id} // ${data.name}`;
            mainImage.style.opacity = 1;
        }, 150);
    }
